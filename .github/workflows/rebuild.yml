name: Rebuild modpack

# Hub of the chained rebuild. Fires when any WF-suite mod publishes a release
# (each mod repo dispatches `wf-mod-updated`), on manual request, or when the
# pack config itself changes. It refreshes the GitHub-sourced WF mods, rebuilds
# the pakku exports, commits the refreshed lock, and publishes a rolling
# `pack-latest` release with the built modpack zips.

on:
  repository_dispatch:
    types: [wf-mod-updated]
  workflow_dispatch:
    inputs:
      update_all:
        description: "Also run `pakku update -a` (bumps every non-frozen project, incl. CurseForge)"
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - pakku.json
      - pakku-lock.json
      - overrides/**

concurrency:
  group: rebuild-modpack
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Show trigger
        run: |
          echo "event=${{ github.event_name }}"
          echo "dispatched-by repo=${{ github.event.client_payload.repo }} tag=${{ github.event.client_payload.tag }}"

      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install pakku
        run: |
          curl -fsSL -o "$RUNNER_TEMP/pakku.jar" \
            https://github.com/juraj-hrivnak/Pakku/releases/latest/download/pakku.jar
          printf '#!/usr/bin/env bash\nexec java -jar "%s" "$@"\n' "$RUNNER_TEMP/pakku.jar" | sudo tee /usr/local/bin/pakku >/dev/null
          sudo chmod +x /usr/local/bin/pakku
          pakku --version

      - name: Configure CurseForge credentials
        env:
          CF_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
        run: |
          if [ -z "$CF_KEY" ]; then echo "::error::CURSEFORGE_API_KEY secret is not set"; exit 1; fi
          mkdir -p "$HOME/.pakku"
          printf '{"curseforge_api_key":"%s"}' "$CF_KEY" > "$HOME/.pakku/credentials"

      - name: Refresh WF-suite GitHub mods
        run: |
          # Frozen projects (update_strategy: NONE) are skipped by pakku automatically:
          #   superb-warfare, timeless-and-classics-zero, Ultimate-Weight (wfweight).
          pakku -y update Warfctory-Modern-Core WarForge-Remaintained SimpleBedrockModel || true
          # Wire mcgltf the moment MCglTF has published its first release (idempotent).
          if ! grep -q 'Warfactory-Official/MCglTF' pakku-lock.json; then
            pakku -y add prj --type mod --gh Warfactory-Official/MCglTF || echo "MCglTF has no release yet - skipping"
          fi

      - name: Re-pin wfweight (multi-platform release; --gh can't auto-select the 1.20.1-Forge jar)
        run: python3 ci/repin-wfweight.py

      - name: Optional full update
        if: ${{ github.event.inputs.update_all == 'true' }}
        run: pakku -y update -a || true

      - name: Build exports
        run: pakku -y export

      - name: Commit refreshed lock
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pakku.json pakku-lock.json
          if git diff --cached --quiet; then
            echo "No lock changes to commit."
          else
            git commit -m "ci: refresh WF-suite pins [skip ci]"
            git push origin main
          fi

      - name: Publish rolling pack-latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          zips=(build/curseforge/*.zip build/modrinth/*.mrpack build/serverpack/*.zip)
          if [ ${#zips[@]} -eq 0 ]; then echo "::error::no build artifacts produced"; exit 1; fi
          gh release delete pack-latest --yes --cleanup-tag || true
          gh release create pack-latest "${zips[@]}" \
            --title "Latest pack build (${GITHUB_SHA::7})" \
            --notes "Automated rebuild triggered by ${{ github.event_name }}." \
            --prerelease

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: warfactory-lite-pack
          if-no-files-found: error
          path: |
            build/curseforge/*.zip
            build/modrinth/*.mrpack
            build/serverpack/*.zip
